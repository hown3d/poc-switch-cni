apiVersion: v1
kind: Service
metadata:
  name: calico
  namespace: default
spec:
  selector:
    cni: calico
  type: ClusterIP 
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
---

apiVersion: v1
kind: Service
metadata:
  name: cilium
  namespace: default
spec:
  selector:
    cni: cilium
  type: ClusterIP 
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
---

