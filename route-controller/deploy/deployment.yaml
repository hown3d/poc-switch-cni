# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: route-controller
  namespace: kube-system
  labels:
    app: route-controller
spec:
  selector:
    matchLabels:
      app: route-controller
  replicas: 2
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: route-controller
    spec:
      serviceAccountName: route-controller
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
      securityContext:
        runAsNonRoot: false
        runAsGroup: 0
        runAsUser: 0
      containers:
      - name: route-controller
        image: ttl.sh/route-controller:latest
        args:
          - --cloud-provider=kind
          - --cluster-name=switch-cni
          - --controllers=node-route-controller
          - --cluster-cidr=10.244.0.0/16
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: docker
          mountPath: /var/run/docker.sock
      volumes:
        - name: docker
          hostPath:
            path: /var/run/docker.sock
      restartPolicy: Always
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: route-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: route-controller:controller-runtime
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
- apiGroups:
  - coordination.k8s.io
  resourceNames:
  - cloud-controller-manager
  resources:
  - leases
  verbs:
  - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: route-controller:route-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:controller:route-controller
subjects:
- kind: ServiceAccount
  name: route-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: route-controller:controller-runtime
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: route-controller:controller-runtime
subjects:
- kind: ServiceAccount
  name: route-controller
  namespace: kube-system
